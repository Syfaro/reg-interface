[package]
name = "reg-interface"
version = "0.1.0"
edition = "2021"
authors = ["Syfaro <syfaro@huefox.com>"]

[features]
default = ["pdf"]
pdf = ["pdfium-render"]

[dependencies]
aamva = { git = "https://github.com/Syfaro/aamva-rs", version = "0.1.0" }
async-hid = "0.1.0"
async-trait = "0.1.83"
async-tungstenite = { version = "0.28.0", features = [
    "tokio-runtime",
    "tokio-rustls-webpki-roots",
] }
base64 = "0.22.1"
eyre = "0.6.12"
flate2 = "1.0.34"
futures = "0.3.31"
hex = "0.4.3"
image = "0.25.5"
ipp = { version = "5.1.0", default-features = false, features = [
    "async",
    "async-client",
] }
itertools = "0.13.0"
jsonwebtoken = "9.3.0"
open = "5.3.0"
pdfium-render = { version = "0.8.26", optional = true }
regex = "1.11.1"
reqwest = { version = "0.12.9", default-features = false, features = [
    "rustls-tls",
    "json",
    "stream",
] }
rhai = { version = "1.20.0", features = ["serde", "sync"] }
rumqttc = { version = "0.24.0", features = ["url", "websocket"] }
serde = { version = "1.0.214", features = ["derive", "rc"] }
serde_json = "1.0.132"
serde_with = "3.11.0"
smol_str = { version = "0.3.2", features = ["serde"] }
tap = "1.0.1"
time = { version = "0.3.36", features = ["macros", "parsing", "serde"] }
tokio = { version = "1.41.1", features = ["macros", "rt-multi-thread"] }
tokio-serial = "5.4.4"
tokio-util = "0.7.12"
toml = "0.8.19"
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
url = "2.5.3"
